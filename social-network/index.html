  <!-- Global Error Handler for Debugging -->
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      // Ignore non-fatal third-party script errors or AbortErrors
      if (message === 'Script error.' || !source || (message && message.includes('AbortError'))) {
        console.warn('Silent/Abort Error caught:', message);
        return;
      }
      const errorContainer = document.getElementById('global-error-display') || document.createElement('div');
      errorContainer.id = 'global-error-display';
      errorContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.9);color:white;padding:20px;z-index:99999;font-family:monospace;white-space:pre-wrap;cursor:pointer;';
      errorContainer.onclick = () => errorContainer.remove();
      errorContainer.innerText += `Global Error: ${message}\nAt: ${source}:${lineno}:${colno}\n\n`;
      document.body.appendChild(errorContainer);
      console.error('Global Error caught:', message, error);
    };
    window.onunhandledrejection = function (event) {
      const reason = String(event.reason);
      // Ignore AbortError - usually harmless (fetch abort, navigator.share cancel, etc.)
      if (reason.includes('AbortError')) {
        console.warn('Unhandled Rejection (AbortError) ignored:', reason);
        return;
      }
      const errorContainer = document.getElementById('global-error-display') || document.createElement('div');
      errorContainer.id = 'global-error-display';
      errorContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.9);color:white;padding:20px;z-index:99999;font-family:monospace;white-space:pre-wrap;cursor:pointer;';
      errorContainer.onclick = () => errorContainer.remove();
      errorContainer.innerText += `Unhandled Rejection: ${event.reason}\n\n`;
      document.body.appendChild(errorContainer);
      console.error('Unhandled Rejection caught:', event.reason);
    };
  </script>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Check if we are on localhost
        const isLocalhost = Boolean(
          window.location.hostname === 'localhost' ||
          // [::1] is the IPv6 localhost address.
          window.location.hostname === '[::1]' ||
          // 127.0.0.0/8 are considered localhost for IPv4.
          window.location.hostname.match(
            /^127(?:\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$/
          )
        );

        if (isLocalhost) {
          // If on localhost, unregister the service worker to avoid caching issues during dev
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister().then((boolean) => {
                if (boolean) {
                  console.log('ServiceWorker unregistered on localhost');
                  // Optional: Reload page to ensure fresh content
                  // window.location.reload(); 
                }
              });
            }
          });
        } else {
          // In production, register the service worker
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            }, (err) => {
              console.log('ServiceWorker registration failed: ', err);
            });
        }
      });
    }
  </script>
